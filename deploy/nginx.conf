# 官方网站 - 80端口
server {
    listen 80;
    server_name _;

    root /opt/ai-study-website;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}

# 应用服务 - 8000端口 HTTPS（PWA + API + WebSocket）
server {
    listen 8000 ssl;
    server_name _;

    ssl_certificate     /etc/ssl/ai-study/server.crt;
    ssl_certificate_key /etc/ssl/ai-study/server.key;
    ssl_protocols       TLSv1.2 TLSv1.3;

    # plain HTTP sent to this SSL port → redirect to https
    error_page 497 https://$host:$server_port$request_uri;

    client_max_body_size 50M;

    root /opt/ai-study-mobile/build/web;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, must-revalidate";
    }

    location ~* \.(js|json)$ {
        try_files $uri =404;
        add_header Cache-Control "no-cache, must-revalidate";
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    location /ws {
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400s;
    }

    location /static/ {
        alias /opt/ai-study-platform/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /health {
        proxy_pass http://127.0.0.1:8001;
    }

    location /docs {
        proxy_pass http://127.0.0.1:8001;
    }

    location /openapi.json {
        proxy_pass http://127.0.0.1:8001;
    }
}
