name: ai_study_platform
description: K12学习指认AI平台 - 学生端(iPad) + 家长端(Android) 双端协同
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # 网络请求
  dio: ^5.7.0
  web_socket_channel: ^3.0.1

  # 本地存储
  shared_preferences: ^2.3.4

  # 图片处理
  image_picker: ^1.1.2

  # UI组件
  cached_network_image: ^3.4.1

  # 工具
  intl: ^0.19.0
  uuid: ^4.5.1
  json_annotation: ^4.9.0
  provider: ^6.1.2
  mime: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
