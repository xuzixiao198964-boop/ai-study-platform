<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="K12学习指认AI平台">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="学习指认AI">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="manifest" href="manifest.json">

  <title>学习指认AI</title>

  <style>
    body { background-color: #f5f7fa; margin: 0; }
    .loading {
      display: flex; flex-direction: column;
      justify-content: center; align-items: center;
      height: 100vh; font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    }
    .loading .spinner {
      width: 40px; height: 40px;
      border: 4px solid #e0e0e0; border-top: 4px solid #4A90D9;
      border-radius: 50%; animation: spin 1s linear infinite;
    }
    .loading p { margin-top: 16px; color: #6B7280; font-size: 14px; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <p>学习指认AI 加载中...</p>
  </div>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
